name: CI Pipeline - Build, Scan and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY_BACKEND: ai-selfhealing-backend
  ECR_REPOSITORY_FRONTEND: ai-selfhealing-frontend
  ECR_REPOSITORY_AI_AGENT: ai-selfhealing-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      ##################################################
      # Backend (Spring Boot)
      ##################################################

      - name: Build Backend Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPOSITORY_BACKEND:$TAG \
            -t $REGISTRY/$ECR_REPOSITORY_BACKEND:latest \
            -f Dockerfile .

      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Push Backend Image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$ECR_REPOSITORY_BACKEND:$TAG
          docker push $REGISTRY/$ECR_REPOSITORY_BACKEND:latest

      ##################################################
      # Frontend
      ##################################################

      - name: Build Frontend Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPOSITORY_FRONTEND:$TAG \
            -t $REGISTRY/$ECR_REPOSITORY_FRONTEND:latest \
            -f frontend/Dockerfile ./frontend

      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Push Frontend Image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$ECR_REPOSITORY_FRONTEND:$TAG
          docker push $REGISTRY/$ECR_REPOSITORY_FRONTEND:latest

      ##################################################
      # AI Self-Healing Agent (ECS Fargate)
      ##################################################

      - name: Build AI Agent Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPOSITORY_AI_AGENT:$TAG \
            -t $REGISTRY/$ECR_REPOSITORY_AI_AGENT:latest \
            -f ai-agent/Dockerfile ./ai-agent

      - name: Scan AI Agent Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_AI_AGENT }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Push AI Agent Image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$ECR_REPOSITORY_AI_AGENT:$TAG
          docker push $REGISTRY/$ECR_REPOSITORY_AI_AGENT:latest

      ##################################################
      # Force ECS redeployment with new image
      ##################################################

      - name: Deploy AI Agent to ECS
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws ecs update-service \
            --cluster ai-selfhealing-agent-cluster \
            --service ai-self-healing-agent \
            --force-new-deployment \
            --region $AWS_REGION
