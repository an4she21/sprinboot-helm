apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/an4she21/sprinboot-helm'
    targetRevision: HEAD
    path: kubernetes/eso
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ai-selfhealing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
