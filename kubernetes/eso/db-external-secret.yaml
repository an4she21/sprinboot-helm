apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secrets
  namespace: ai-selfhealing
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm-store
    kind: ClusterSecretStore
  target:
    name: db-secrets # This is the name of the K8s secret that will be created
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: /ai-selfhealing/db-password # Replace with your actual SSM parameter name
