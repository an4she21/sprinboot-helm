apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-platform.fullname" . }}-config
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
data:
  SPRING_DATASOURCE_URL: "jdbc:mariadb://{{ .Values.database.host }}:3306/{{ .Values.database.name }}"
  SPRING_DATASOURCE_USERNAME: {{ .Values.database.user | quote }}
  # Password should be in a Secret, not ConfigMap
