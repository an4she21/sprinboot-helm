apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-platform.fullname" . }}-backend
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.backend.type }}
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: 8080
      protocol: TCP
  selector:
    app: {{ include "ai-platform.fullname" . }}-backend
