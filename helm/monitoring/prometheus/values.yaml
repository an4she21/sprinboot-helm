# Prometheus lightweight values (Corrected for wrapper chart dependency)
prometheus:
  server:
    retain_drop_markers: false
    persistentVolume:
      enabled: true
      storageClass: "gp2"
      size: 8Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  alertmanager:
    enabled: true
    persistentVolume:
      enabled: true
      storageClass: "gp2"
      size: 2Gi

  pushgateway:
    enabled: false
