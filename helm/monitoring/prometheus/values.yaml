# Prometheus lightweight values (Fixed for wrapper chart)
# These keys must match the official prometheus chart structure exactly

server:
  retain_drop_markers: false
  persistentVolume:
    enabled: true
    storageClass: "gp2"
    size: 8Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

alertmanager:
  enabled: true
  persistentVolume:
    enabled: true
    storageClass: "gp2"
    size: 2Gi

pushgateway:
  enabled: false
