# Prometheus lightweight values (Using emptyDir for test environment)
prometheus:
  server:
    retain_drop_markers: false
    persistentVolume:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  alertmanager:
    enabled: true
    persistence:
      enabled: false
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'namespace']
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 3h
        receiver: ai-agent
        routes:
          - match:
              severity: critical
            receiver: ai-agent
          - match:
              severity: warning
            receiver: ai-agent
      receivers:
        - name: ai-agent
          webhook_configs:
            - url: "http://ai-agent.ai-selfhealing.internal/webhook"
              send_resolved: true

  pushgateway:
    enabled: false

  serverFiles:
    alerting_rules.yml:
      groups:
        - name: pod-health
          rules:
            - alert: PodCrashLooping
              expr: rate(kube_pod_container_status_restarts_total[5m]) > 0.1
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Pod {{ $labels.pod }} is crash looping"
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 3 times in the last 5 minutes."

            - alert: PodOOMKilled
              expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "Pod {{ $labels.pod }} was OOMKilled"
                description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was killed due to OOM."

            - alert: DeploymentReplicasMismatch
              expr: kube_deployment_spec_replicas != kube_deployment_status_ready_replicas
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Deployment {{ $labels.deployment }} replica mismatch"
                description: "Deployment {{ $labels.deployment }} has {{ $value }} ready replicas, expected {{ $labels.spec_replicas }}."

            - alert: PodNotReady
              expr: kube_pod_status_ready{condition="true"} == 0
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Pod {{ $labels.pod }} is not ready"
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been in a non-ready state for more than 5 minutes."
