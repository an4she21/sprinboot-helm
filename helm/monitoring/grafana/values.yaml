# Grafana lightweight values
service:
  type: LoadBalancer
  port: 80

persistence:
  enabled: false # Use emptyDir for testing to avoid PVC issues

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Securely inject admin password from ExternalSecret
extraEnv:
  - name: GF_SECURITY_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: grafana-admin-secret
        key: admin-password
