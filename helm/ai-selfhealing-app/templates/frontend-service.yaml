apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-platform.fullname" . }}-frontend
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.frontend.type }}
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: 80
      protocol: TCP
  selector:
    app: {{ include "ai-platform.fullname" . }}-frontend
