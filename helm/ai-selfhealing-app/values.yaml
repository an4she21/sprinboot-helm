# Default values for ai-platform.
replicaCount: 1

image:
  backend:
    repository: 181728646118.dkr.ecr.eu-north-1.amazonaws.com/ai-selfhealing-backend
    pullPolicy: IfNotPresent
    tag: "latest"
  frontend:
    repository: 181728646118.dkr.ecr.eu-north-1.amazonaws.com/ai-selfhealing-frontend
    pullPolicy: Always
    tag: "latest"

service:
  backend:
    type: ClusterIP
    port: 8080
  frontend:
    type: LoadBalancer
    port: 80

# Database configuration
database:
  host: "ai-selfhealing-db.cree8sgg8dvr.eu-north-1.rds.amazonaws.com"
  name: "voiture_db"
  user: "admin"

# Resource limits for pods (Optimized for dev/SRE demo)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Probes for reliability
probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 10
